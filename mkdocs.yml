site_name: OMGrab SDK
site_url: https://omgrab.github.io/omgrab-sdk/
site_description: SDK for egocentric data collection with OMGrab hardware
repo_url: https://github.com/OMGrab/omgrab-sdk

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.highlight

extra:
  version:
    provider: mike

plugins:
  - search
  - mike
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Device Runtime: runtime-app.md
  - API Reference:
    - devices: api/devices.md
    - cameras: api/cameras.md
    - sensors: api/sensors.md
    - recording: api/recording.md
    - runtime: api/runtime.md
    - workflows: api/workflows.md
    - gpio: api/gpio.md
    - display: api/display.md
    - utils: api/utils.md
    - testing: api/testing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
